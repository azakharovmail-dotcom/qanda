# Host Nginx reverse proxy for qanda.online.
#
#   qanda.online, www.qanda.online  → app-prod    (127.0.0.1:3001)
#   staging.qanda.online            → app-staging  (127.0.0.1:3002)
#
# Starts as HTTP :80 only. After DNS resolves, run:
#   certbot --nginx -d qanda.online -d www.qanda.online -d staging.qanda.online
# certbot rewrites these blocks in place to add the 443 listeners, the
# certificate paths, and the HTTP→HTTPS redirect. Do not hand-edit 443 here.
#
# Install:
#   cp deploy/nginx/qanda.conf /etc/nginx/sites-available/qanda.conf
#   ln -sf /etc/nginx/sites-available/qanda.conf /etc/nginx/sites-enabled/qanda.conf
#   nginx -t && systemctl reload nginx

# WebSocket upgrade helper: "upgrade" when the client asks for it, else "close".
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_min_length 1024;
gzip_types text/plain text/css application/javascript application/json image/svg+xml;

# ── PROD: qanda.online / www.qanda.online → app-prod (3001) ───────────────
server {
    listen 80;
    listen [::]:80;
    server_name qanda.online www.qanda.online;

    location = /api/health {
        proxy_pass http://127.0.0.1:3001;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# ── STAGING: staging.qanda.online → app-staging (3002) ────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name staging.qanda.online;

    location = /api/health {
        proxy_pass http://127.0.0.1:3002;
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
